<style>
/* ══════════════════════════════════════════════════════════════
   NAVBAR RESPONSIVE FIXES
   This <style> is injected with the navbar fragment via fetch().
   Browsers correctly process <style> tags inserted via innerHTML.
══════════════════════════════════════════════════════════════ */

/* ── 1. Hamburger: accessible 44px tap target, always on top ── */
.nav-hamburger {
    min-width: 44px;
    min-height: 44px;
    z-index: 1200;
    position: relative;
    flex-shrink: 0;
}

/* ── 2. Mobile dropdown: correct top position ──────────────────
   Default (topbar visible): top = topbar-h + nav-h
   When JS adds .topbar-hidden to #mainNav: top = nav-h only
   At ≤600px: topbar is display:none → --topbar-h = 0px already
────────────────────────────────────────────────────────────── */
@media (max-width: 1240px) {
    .nav-links {
        top: calc(var(--topbar-h) + var(--nav-h));
        max-height: calc(100dvh - var(--topbar-h) - var(--nav-h));
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
    }

    /* topbar hidden by scroll → navbar is now at top:0 */
    #mainNav.topbar-hidden .nav-links {
        top: var(--nav-h) !important;
        max-height: calc(100dvh - var(--nav-h)) !important;
    }
}

@media (max-width: 600px) {
    /* --topbar-h is 0px here (topbar display:none), belt-and-braces */
    .nav-links {
        top: var(--nav-h) !important;
        max-height: calc(100dvh - var(--nav-h)) !important;
    }
}

/* ── 3. CTA "Book Transfer" button in mobile menu ─────────────
   Give it a dedicated class .nav-cta-li for clean targeting.
────────────────────────────────────────────────────────────── */
@media (max-width: 1240px) {
    .nav-cta-li {
        width: 100%;
        padding: 0.5rem 1.5rem 1rem !important;
    }

    .nav-cta-li .nav-cta-btn {
        width: 100%;
        margin-left: 0 !important;
        justify-content: center;
        box-sizing: border-box;
    }
}

/* ── 4. Logo sizing across breakpoints ─────────────────────── */
@media (max-width: 600px) {
    .nav-logo { flex: 1 1 auto; }
    .nav-logo img { height: 44px; max-width: 160px; }

</style>

<script>
/* ── Keep aria-expanded in sync with the open/close toggle ──── */
(function () {
    function init() {
        var hamburger = document.getElementById('hamburger');
        var navLinks  = document.getElementById('navLinks');
        if (!hamburger || !navLinks) return;

        new MutationObserver(function () {
            hamburger.setAttribute(
                'aria-expanded',
                navLinks.classList.contains('open') ? 'true' : 'false'
            );
        }).observe(navLinks, { attributes: true, attributeFilter: ['class'] });
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();
</script>
