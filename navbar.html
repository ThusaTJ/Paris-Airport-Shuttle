<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Navbar — Paris Airport Shuttle</title>
    <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar" id="topbar">
    <div class="topbar-inner">
        <div class="topbar-left">
            <a href="tel:+330143327081" class="topbar-link">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                    <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.85 13a19.79 19.79 0 01-3.07-8.67A2 2 0 012.76 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.91 9.91a16 16 0 006.08 6.08l1.07-1.07a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/>
                </svg>
                +33 (0)1 43 327 081 — 24/7
            </a>
            <a href="mailto:contact@parisairportshuttle.fr" class="topbar-link">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                    <polyline points="22,6 12,13 2,6"/>
                </svg>
                contact@parisairportshuttle.fr
            </a>
        </div>
        <div class="topbar-right">
            <span class="topbar-badge">
                <span class="topbar-dot"></span>
                24/7 Available
            </span>
            <div class="topbar-divider"></div>

            <!-- Translate -->
            <div class="translate-wrap" id="translateWrap">
                <button class="translate-btn" id="translateBtn" aria-label="Language selector" type="button">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="2" y1="12" x2="22" y2="12"/>
                        <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
                    </svg>
                    <span id="currentLang">EN</span>
                    <svg class="translate-caret" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <polyline points="6,9 12,15 18,9"/>
                    </svg>
                </button>
                <div class="translate-dropdown" id="translateDropdown">
                    <button class="lang-opt active" data-lang="en" data-label="EN" type="button">🇺🇸 English</button>
                    <button class="lang-opt" data-lang="es" data-label="ES" type="button">🇪🇸 Español</button>
                    <button class="lang-opt" data-lang="fr" data-label="FR" type="button">🇫🇷 Français</button>
                    <button class="lang-opt" data-lang="de" data-label="DE" type="button">🇩🇪 Deutsch</button>
                    <button class="lang-opt" data-lang="zh-CN" data-label="ZH" type="button">🇨🇳 中文</button>
                    <button class="lang-opt" data-lang="ar" data-label="AR" type="button">🇸🇦 العربية</button>
                </div>
                <div id="google_translate_element" style="display:none;visibility:hidden;"></div>
            </div>
        </div>
    </div>
</div>

<!-- MAIN NAVBAR -->
<nav class="main-nav" id="mainNav">
    <div class="nav-inner">
        <a class="nav-logo" href="index.html" aria-label="Paris Airport Shuttle Home">
            <img src="img/logo.png" alt="Paris Airport Shuttle" />
        </a>

        <ul class="nav-links" id="navLinks">
            <li><a href="index.html" class="nav-link">Home</a></li>
            <li><a href="about.html" class="nav-link">About</a></li>
            <li><a href="services.html" class="nav-link">Services</a></li>
            <li><a href="fleet.html" class="nav-link">Fleet</a></li>
            <li><a href="rates.html" class="nav-link">Rates</a></li>
            <li><a href="faq.html" class="nav-link">FAQ</a></li>
            <li><a href="contact.html" class="nav-link">Contact</a></li>
            <li>
                <a href="contact.html" class="nav-cta-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                        <path d="M8 6l4-4 4 4M12 2v13"/>
                        <path d="M20 16.58A5 5 0 0018 7h-1.26A8 8 0 104 15.25"/>
                    </svg>
                    Book Transfer
                </a>
            </li>
        </ul>

        <button class="nav-hamburger" id="hamburger" aria-label="Toggle menu" type="button">
            <span></span><span></span><span></span>
        </button>
    </div>
</nav>

<script src="js/script.js"></script>
</body>
</html>
